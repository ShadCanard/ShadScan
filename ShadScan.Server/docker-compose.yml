version: '3.9'

services:
  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: scan_manager
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql://root:example@db:3306/scan_manager
    ports:
      - "4000:4000"
    volumes:
      # mount code but not node_modules so platform-specific binaries stay
      - ./backend:/app
      # use a named volume for node_modules so we can recreate it when necessary
      - backend_node_modules:/app/node_modules
      # persist uploads directory
      - uploads_data:/app/uploads
    command: sh -c "npm run dev"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      # keep container's node_modules separate from host
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run dev"

volumes:
  db_data:
  uploads_data:
  backend_node_modules:
