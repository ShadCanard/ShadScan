version: '3.9'

services:
  db:
    image: mariadb:10.11
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: scan_manager
    volumes:
      - db_data:/var/lib/mysql
    # no published ports; accessible only to other services on the network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    user: "1000:1000" # run as non-root (matches app user created in Dockerfile)
    depends_on:
      - db
    env_file:
      - .env
    environment:
      # DATABASE_URL is defined in the root .env file
      # override if necessary
      DATABASE_URL: ${DATABASE_URL}
    ports: # expose for local development/debugging
      - "4000:4000"
    # volumes intentionally omitted in prod; re-enable for development as needed
    #mounts:
    #  - ./backend:/app:ro
    #  - backend_node_modules:/app/node_modules
    #  - uploads_data:/app/uploads
    read_only: true
    tmpfs: # writeable temp space for runtime files if needed
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # runtime command left to image default (dev vs prod chosen in Dockerfile/CMD)
    #command: sh -c "npm run dev"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    user: "1000:1000"
    depends_on:
      - backend
    ports:
      - "3000:3000"
    # volumes:
    #   # keep container's node_modules separate from host
    #   - ./frontend:/app:ro   # not mounted in production build
    #   - /app/node_modules
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
      # allow network
    cap_add:
      - NET_BIND_SERVICE
    # use built-in start command which defaults to production
    #command: sh -c "npm run dev"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data:
  uploads_data:
  backend_node_modules:
