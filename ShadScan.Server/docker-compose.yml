version: '3.9'

services:
  db:
    image: mariadb:10.11
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: scan_manager
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - db
    env_file:
      - .env
    environment:
      # DATABASE_URL is defined in the root .env file
      # override if necessary
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "4000:4000"
    volumes:
      # mount code but not node_modules so platform-specific binaries stay
      - ./backend:/app
      # use a named volume for node_modules so we can recreate it when necessary
      - backend_node_modules:/app/node_modules
      # persist uploads directory
      - uploads_data:/app/uploads
    command: sh -c "npm run dev"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/graphql -X POST -H 'Content-Type: application/json' -d '{\"query\":\"{__typename}\"}' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      # keep container's node_modules separate from host
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run dev"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data:
  uploads_data:
  backend_node_modules:
